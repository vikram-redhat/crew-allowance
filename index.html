      <main style="max-width:760px;margin:40px auto;padding:24px;font-family:system-ui,Segoe UI,Arial,sans-serif;color:#1e293b;">
        <h1>IndiGo Pilot Allowance Calculator — CrewAllowance.com</h1>
        <p>
          CrewAllowance.com is an independent web tool for IndiGo cockpit crew to verify
          their monthly allowances against <strong>PAH FLT Issue 01 Rev 46</strong>.
          Upload your end-of-month <em>Personal Crew Schedule Report (PCSR)</em> PDF and
          your <em>Sector Value (SV)</em> Excel file from 6eBreeze, and the calculator
          produces a per-sector breakdown of the five PAH allowances:
        </p>
        <ul>
          <li><strong>Deadhead Allowance</strong> (PAH §1.0) — ₹4,000/scheduled block hour for Captains.</li>
          <li><strong>TLPD / Domestic Layover</strong> (PAH §2.0) — ₹3,000 flat for 10:01–24:00 hrs, +₹150/hr beyond.</li>
          <li><strong>Tail Swap Allowance</strong> (PAH §6.0) — ₹1,500 per qualifying same-duty swap.</li>
          <li><strong>Transit Halt Allowance</strong> (PAH §7.0) — ₹1,000/hr (4-hr cap) on the 90-minute rule.</li>
          <li><strong>Night Flying Allowance</strong> (PAH §9.0) — ₹2,000/night hour, calculated from STD (not ATD).</li>
        </ul>
        <p>
          The calculator is built for any IndiGo crew member — your home base, rank
          (Captain / First Officer / LTC / TRI / DE) and employee ID are stored in
          your profile and used to apply the correct rates from PAH §11.0.
        </p>
        <p>
